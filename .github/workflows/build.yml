name: Build KLSR Radio
on: { push: { branches: [main] }, workflow_dispatch: }
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4 with: { java-version: '17', distribution: 'temurin' }
      - uses: gradle/actions/setup-gradle@v3 with: { gradle-version: '8.4' }
      - run: gradle assembleDebug
      - run: gradle bundleDebug
      - uses: actions/upload-artifact@v4 with: { name: klsr-radio-debug-apk, path: app/build/outputs/apk/debug/app-debug.apk }
      - uses: actions/upload-artifact@v4 with: { name: klsr-radio-debug-aab, path: app/build/outputs/bundle/debug/app-debug.aab }
